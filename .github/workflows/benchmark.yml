name: ML Benchmark Pipeline

on:
  push:
    paths:
      - 'Packages/FinanceIntelligence/**'
      - 'training/**'
      - '.github/workflows/benchmark.yml'
  pull_request:
    paths:
      - 'Packages/FinanceIntelligence/**'
      - 'training/**'
  schedule:
    # Weekly run: Monday 02:00 UTC
    - cron: '0 2 * * 1'
  workflow_dispatch:

jobs:
  benchmark:
    name: Run ML Benchmarks
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install -r training/requirements.txt
          pip install scikit-learn>=1.3.0 torch>=2.0.0

      - name: Run category benchmark
        id: category
        run: |
          python3 training/category/benchmark.py 2>&1 | tee /tmp/category_benchmark.log
        continue-on-error: true

      - name: Run merchant benchmark
        id: merchant
        run: |
          python3 training/merchant/benchmark.py 2>&1 | tee /tmp/merchant_benchmark.log
        continue-on-error: true

      - name: Run intent benchmark
        id: intent
        run: |
          python3 training/intent/benchmark.py 2>&1 | tee /tmp/intent_benchmark.log
        continue-on-error: true

      - name: Run income benchmark
        id: income
        run: |
          python3 training/income/benchmark.py 2>&1 | tee /tmp/income_benchmark.log
        continue-on-error: true

      - name: Run recurring benchmark
        id: recurring
        run: |
          python3 training/recurring/benchmark.py 2>&1 | tee /tmp/recurring_benchmark.log
        continue-on-error: true

      - name: Run anomaly benchmark
        id: anomaly
        run: |
          python3 training/anomaly/evaluate.py 2>&1 | tee /tmp/anomaly_benchmark.log
        continue-on-error: true

      - name: Run link predictor benchmark
        id: link_pred
        run: |
          python3 -c "
          import sys; sys.path.insert(0, 'training/link_prediction')
          from train import main
          " 2>&1 | tee /tmp/link_pred_benchmark.log
        continue-on-error: true

      - name: Run embedding benchmark
        id: embedding
        run: |
          python3 training/embedding/benchmark.py 2>&1 | tee /tmp/embedding_benchmark.log
        continue-on-error: true

      - name: Check regression thresholds
        run: |
          python3 << 'EOF'
          import json, glob, sys

          reports = glob.glob('training/reports/*_metrics.json')
          regressions = []

          for path in sorted(reports):
              try:
                  with open(path) as f:
                      data = json.load(f)
                  passed = data.get('passed', True)
                  name = data.get('model_name', path)
                  if not passed:
                      regressions.append(f"REGRESSION: {name} failed thresholds in {path}")
              except Exception as e:
                  print(f"Warning: could not parse {path}: {e}")

          if regressions:
              for r in regressions:
                  print(f"::error::{r}")
              sys.exit(1)
          else:
              print("✓ All benchmark reports passed threshold checks")
          EOF

      - name: Upload benchmark reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-reports-${{ github.run_number }}
          path: training/reports/
          retention-days: 30

      - name: Summarize results
        if: always()
        run: |
          echo "## Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for log in /tmp/*_benchmark.log; do
            name=$(basename $log .log)
            status=$(grep -c "PASS\|passed" $log 2>/dev/null || echo "0")
            fail=$(grep -c "FAIL\|failed" $log 2>/dev/null || echo "0")
            echo "- **$name**: $([ "$fail" -gt "0" ] && echo "❌ Failed" || echo "✅ Passed")" >> $GITHUB_STEP_SUMMARY
          done
