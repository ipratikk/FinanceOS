name: Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint
        run: |
          which swiftlint || brew install swiftlint
          swiftlint --strict --quiet

  package-tests:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        package: [FinanceCore, FinanceParsers, FinanceUI, FinanceTesting]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.1"

      - name: Cache ${{ matrix.package }} build
        uses: actions/cache@v4
        with:
          path: Packages/${{ matrix.package }}/.build
          key: swift-${{ matrix.package }}-${{ runner.os }}-${{ hashFiles(format('Packages/{0}/Package.resolved', matrix.package)) }}
          restore-keys: swift-${{ matrix.package }}-${{ runner.os }}-

      - name: Test ${{ matrix.package }}
        run: swift test --package-path Packages/${{ matrix.package }} --parallel

  snapshot-tests:
    runs-on: macos-26-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: xcode-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: xcode-${{ runner.os }}-

      - name: Run Snapshot Tests
        run: xcodebuild test -scheme FinanceOSMac -quiet
