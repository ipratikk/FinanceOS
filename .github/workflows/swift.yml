name: Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Swift
      uses: swift-actions/setup-swift@v2
      with:
        swift-version: "6.1"

    - name: Cache DerivedData
      uses: actions/cache@v4
      with:
        path: ~/Library/Developer/Xcode/DerivedData
        key: xcode-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
        restore-keys: xcode-${{ runner.os }}-

    - name: Lint
      run: |
        brew install swiftlint
        swiftlint --strict --quiet

    - name: Build macOS App
      run: xcodebuild build -scheme FinanceOSMac -quiet

    - name: Run FinanceCore Tests
      run: swift test --package-path Packages/FinanceCore --parallel

    - name: Run FinanceParsers Tests
      run: swift test --package-path Packages/FinanceParsers --parallel

    - name: Run FinanceUI Tests
      run: swift test --package-path Packages/FinanceUI --parallel

    - name: Run FinanceTesting Tests
      run: swift test --package-path Packages/FinanceTesting --parallel

    - name: Run Snapshot Tests
      run: xcodebuild test -scheme FinanceOSMac -quiet
