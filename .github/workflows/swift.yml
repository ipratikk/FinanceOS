name: Build and Test

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

defaults:
  run:
    shell: bash

env:
  SPM_BUILD_PATH: .spm-build
  DERIVED_DATA_PATH: .derivedData

# =========================================================
# Concurrency
# =========================================================

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# =========================================================
# Jobs
# =========================================================

jobs:

  # =======================================================
  # SwiftLint
  # =======================================================

  lint:
    name: SwiftLint
    runs-on: macos-26

    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install SwiftLint
        run: |
          set -euo pipefail

          if ! command -v swiftlint >/dev/null 2>&1; then
            brew install swiftlint
          fi

      - name: Lint Changed Files
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then

            CHANGED_FILES=$(
              git diff --name-only origin/main...HEAD \
                | grep '\.swift$' || true
            )

            if [[ -z "$CHANGED_FILES" ]]; then
              echo "No Swift files changed"
              exit 0
            fi

            echo "Linting changed Swift files"

            while IFS= read -r file; do

              [[ -z "$file" ]] && continue

              echo "Linting $file"

              swiftlint lint \
                --strict \
                --quiet \
                "$file"

            done <<< "$CHANGED_FILES"

          else
            swiftlint lint --strict --quiet
          fi

  # =======================================================
  # Package Tests
  # =======================================================

  package-tests:
    name: Package Tests (${{ matrix.package }})
    runs-on: macos-26

    timeout-minutes: 20

    strategy:
      fail-fast: false

      matrix:
        package:
          - FinanceCore
          - FinanceParsers
          - FinanceUI
          - FinanceTesting

    steps:
      - uses: actions/checkout@v4

      - name: Cache Shared SPM Build
        uses: actions/cache@v4
        with:
          path: ${{ env.SPM_BUILD_PATH }}

          key: >
            spm-${{ runner.os }}-${{ matrix.package }}-${{
              hashFiles(
                'Packages/**/Package.swift',
                'Packages/**/Package.resolved'
              )
            }}

          restore-keys: |
            spm-${{ runner.os }}-${{ matrix.package }}-
            spm-${{ runner.os }}-

      - name: Resolve Package Dependencies
        run: |
          set -euo pipefail

          swift package resolve \
            --package-path Packages/${{ matrix.package }}

      - name: Run Package Tests
        run: |
          set -euo pipefail

          swift test \
            --package-path Packages/${{ matrix.package }} \
            --build-path ${{ env.SPM_BUILD_PATH }} \
            --parallel

  # =======================================================
  # macOS Build
  # =======================================================

  macos-build:
    name: macOS Build
    runs-on: macos-26

    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ${{ env.DERIVED_DATA_PATH }}

          key: >
            deriveddata-${{ runner.os }}-${{
              hashFiles(
                '**/Package.resolved',
                '**/*.xcodeproj/project.pbxproj'
              )
            }}

          restore-keys: |
            deriveddata-${{ runner.os }}-

      - name: Build macOS App
        run: |
          set -euo pipefail

          xcodebuild \
            build \
            -scheme FinanceOSMac \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath ${{ env.DERIVED_DATA_PATH }} \
            COMPILER_INDEX_STORE_ENABLE=NO \
            -parallelizeTargets \
            -quiet

