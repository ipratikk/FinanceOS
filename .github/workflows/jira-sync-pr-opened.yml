name: JIRA Sync — PR Opened

# When a PR is opened or updated, extract the JIRA key and transition the issue
# to "In Review" (transition name varies by JIRA project; configurable below).
#
# Required GitHub Secrets:
#   JIRA_HOST        — e.g. "yourorg.atlassian.net"  (no https://)
#   JIRA_USER        — Atlassian account email
#   JIRA_API_TOKEN   — Atlassian API token

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: jira-sync-opened-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  transition-to-in-review:
    name: Transition JIRA to In Review
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Extract JIRA key
        id: extract
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail

          echo "Extracting JIRA key..."
          echo "  PR title : ${PR_TITLE}"
          echo "  Branch   : ${PR_HEAD_REF}"

          JIRA_KEY=""

          # Strategy 1: body field "**JIRA Issue:** KAN-42"
          JIRA_KEY=$(
            echo "$PR_BODY" \
              | grep -oP '(?<=\*\*JIRA Issue:\*\*\s{0,10})[A-Z]+-[0-9]+' \
              || true
          )

          # Strategy 2: PR title prefix "KAN-42: Description" or "KAN-42 Description"
          if [[ -z "$JIRA_KEY" ]]; then
            JIRA_KEY=$(
              echo "$PR_TITLE" \
                | grep -oP '^[A-Z]+-[0-9]+(?=\s*[:\-\s])' \
                || true
            )
          fi

          # Strategy 3: branch name "feat/description(KAN-42)"
          if [[ -z "$JIRA_KEY" ]]; then
            JIRA_KEY=$(
              echo "$PR_HEAD_REF" \
                | grep -oP '\(([A-Z]+-[0-9]+)\)' \
                | grep -oP '[A-Z]+-[0-9]+' \
                | head -1 \
                || true
            )
          fi

          # Strategy 4: branch name "feat/KAN-42-description"
          if [[ -z "$JIRA_KEY" ]]; then
            JIRA_KEY=$(
              echo "$PR_HEAD_REF" \
                | grep -oP '[A-Z]+-[0-9]+' \
                | head -1 \
                || true
            )
          fi

          if [[ -n "$JIRA_KEY" ]]; then
            echo "JIRA key found: ${JIRA_KEY}"
            echo "jira_key=${JIRA_KEY}" >> "$GITHUB_OUTPUT"
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "WARNING: No JIRA key found in PR title, body, or branch name."
            echo "  Skipping JIRA transition."
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Find 'In Review' transition ID
        id: find-transition
        if: steps.extract.outputs.found == 'true'
        env:
          JIRA_HOST: ${{ secrets.JIRA_HOST }}
          JIRA_USER: ${{ secrets.JIRA_USER }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_KEY: ${{ steps.extract.outputs.jira_key }}
          # Comma-separated list of transition names to try (case-insensitive).
          # First match wins. Adjust to your JIRA workflow naming.
          TRANSITION_NAMES: "In Review,Code Review,Review,In review"
        run: |
          set -euo pipefail

          echo "Fetching available transitions for ${JIRA_KEY}..."

          RESPONSE=$(
            curl --silent --fail-with-body \
              --user "${JIRA_USER}:${JIRA_API_TOKEN}" \
              --header "Accept: application/json" \
              "https://${JIRA_HOST}/rest/api/3/issue/${JIRA_KEY}/transitions"
          )

          echo "Available transitions (dry-run log):"
          echo "$RESPONSE" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for t in data.get('transitions', []):
              print(f\"  id={t['id']}  name={t['name']}\")
          "

          # Find the first matching transition name
          TRANSITION_ID=$(
            echo "$RESPONSE" | python3 -c "
          import json, sys, os
          data = json.load(sys.stdin)
          names = [n.strip().lower() for n in os.environ['TRANSITION_NAMES'].split(',')]
          for t in data.get('transitions', []):
              if t['name'].lower() in names:
                  print(t['id'])
                  sys.exit(0)
          sys.exit(1)
          " || true
          )

          if [[ -n "$TRANSITION_ID" ]]; then
            echo "Matched transition ID: ${TRANSITION_ID}"
            echo "transition_id=${TRANSITION_ID}" >> "$GITHUB_OUTPUT"
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "WARNING: No matching transition found for names: ${TRANSITION_NAMES}"
            echo "  Skipping JIRA transition. Update TRANSITION_NAMES env var to match your workflow."
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Transition JIRA issue to In Review
        if: steps.extract.outputs.found == 'true' && steps.find-transition.outputs.found == 'true'
        env:
          JIRA_HOST: ${{ secrets.JIRA_HOST }}
          JIRA_USER: ${{ secrets.JIRA_USER }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_KEY: ${{ steps.extract.outputs.jira_key }}
          TRANSITION_ID: ${{ steps.find-transition.outputs.transition_id }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          echo "Transitioning ${JIRA_KEY} to In Review (transition ${TRANSITION_ID})..."

          HTTP_STATUS=$(
            curl --silent --output /dev/null --write-out "%{http_code}" \
              --request POST \
              --url "https://${JIRA_HOST}/rest/api/3/issue/${JIRA_KEY}/transitions" \
              --user "${JIRA_USER}:${JIRA_API_TOKEN}" \
              --header "Accept: application/json" \
              --header "Content-Type: application/json" \
              --data "{\"transition\":{\"id\":\"${TRANSITION_ID}\"}}"
          )

          if [[ "$HTTP_STATUS" == "204" ]]; then
            echo "OK: ${JIRA_KEY} transitioned to In Review (PR #${PR_NUMBER}: ${PR_URL})"
          else
            echo "ERROR: Transition failed with HTTP ${HTTP_STATUS}"
            exit 1
          fi
