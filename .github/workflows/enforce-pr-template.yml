name: Enforce PR Template

# Validates that the PR body contains required JIRA and GitHub Issue fields.
# Blocks the PR (sets a failed status check) if either field is missing or unfilled.

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

concurrency:
  group: enforce-pr-template-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate-pr-body:
    name: Validate PR Template Fields
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check required fields
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          echo "PR #${PR_NUMBER}: Validating required template fields..."
          echo "---"

          FAILED=0

          # -------------------------------------------------------
          # 1. JIRA Issue field
          #    Accepts: "KAN-42", "PROJ-123", etc. (one or more uppercase letters, dash, digits)
          #    Looks for the template line: "**JIRA Issue:**" followed by a key
          # -------------------------------------------------------

          # Try extracting from the JIRA Issue field in the body
          JIRA_FROM_BODY=$(
            echo "$PR_BODY" \
              | grep -oP '(?<=\*\*JIRA Issue:\*\*\s{0,10})[A-Z]+-[0-9]+' \
              || true
          )

          # Fallback: extract from PR title (e.g. "KAN-8: Description")
          JIRA_FROM_TITLE=$(
            echo "$PR_TITLE" \
              | grep -oP '^[A-Z]+-[0-9]+(?=\s*[:\-])' \
              || true
          )

          # Fallback: extract from branch name embedded in title or body
          # Branch convention: feat/description(KAN-8)
          JIRA_FROM_BRANCH=$(
            echo "$PR_BODY $PR_TITLE" \
              | grep -oP '\(([A-Z]+-[0-9]+)\)' \
              | grep -oP '[A-Z]+-[0-9]+' \
              | head -1 \
              || true
          )

          JIRA_KEY="${JIRA_FROM_BODY:-${JIRA_FROM_TITLE:-${JIRA_FROM_BRANCH:-}}}"

          if [[ -n "$JIRA_KEY" ]]; then
            echo "JIRA Issue: ${JIRA_KEY}"
          else
            echo "MISSING: JIRA Issue key not found."
            echo "  Expected one of:"
            echo "    - Body field '**JIRA Issue:** KAN-XX'"
            echo "    - PR title starting with 'KAN-XX:'"
            echo "    - PR title containing '(KAN-XX)'"
            FAILED=1
          fi

          # -------------------------------------------------------
          # 2. GitHub Issue field
          #    Accepts: "#123"
          #    Looks for the template line: "**GitHub Issue:**" followed by #NNN
          #    or the "Closes #NNN" pattern in the body
          # -------------------------------------------------------

          GH_ISSUE_FROM_FIELD=$(
            echo "$PR_BODY" \
              | grep -oP '(?<=\*\*GitHub Issue:\*\*\s{0,10})#[0-9]+' \
              || true
          )

          GH_ISSUE_FROM_CLOSES=$(
            echo "$PR_BODY" \
              | grep -oP '(?i)(?:Closes|Fixes|Resolves)\s+#[0-9]+' \
              | grep -oP '#[0-9]+' \
              | head -1 \
              || true
          )

          GH_ISSUE="${GH_ISSUE_FROM_FIELD:-${GH_ISSUE_FROM_CLOSES:-}}"

          if [[ -n "$GH_ISSUE" ]]; then
            echo "GitHub Issue: ${GH_ISSUE}"
          else
            echo "MISSING: GitHub Issue # not found."
            echo "  Expected one of:"
            echo "    - Body field '**GitHub Issue:** #NNN'"
            echo "    - 'Closes #NNN' / 'Fixes #NNN' anywhere in body"
            FAILED=1
          fi

          echo "---"

          if [[ $FAILED -eq 1 ]]; then
            echo "FAILED: PR template fields are incomplete."
            echo "Please fill in the Tracking section of the PR description."
            exit 1
          fi

          echo "OK: All required fields present (JIRA=${JIRA_KEY}, GitHub=${GH_ISSUE})"
