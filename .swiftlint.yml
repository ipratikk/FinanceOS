disabled_rules:
  - trailing_whitespace

opt_in_rules:
  - empty_count
  - explicit_init
  - force_unwrapping
  - force_cast
  - fatal_error_message
  - first_where
  - sorted_first_last
  - unused_import

included:
  - Apps
  - Packages

excluded:
  - .build
  - DerivedData

line_length:
  warning: 120
  error: 160

type_body_length:
  warning: 300

file_length:
  warning: 500