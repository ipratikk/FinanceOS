disabled_rules:
  - trailing_whitespace

opt_in_rules:
  - empty_count
  - explicit_init
  - force_unwrapping
  - force_cast
  - fatal_error_message
  - first_where
  - sorted_first_last
  - unused_import
  - prefer_self_type_over_type_of_self
  - comma_spacing

included:
  - Apps
  - Packages

excluded:
  - .build
  - DerivedData

line_length:
  warning: 120
  error: 160

type_body_length:
  warning: 250
  error: 300

file_length:
  warning: 400
  error: 500

function_body_length:
  warning: 50
  error: 75

identifier_name:
  min_length:
    warning: 1

custom_rules:
  # Enforce token-driven design: no hardcoded Color.white
  hardcoded_white_color:
    name: "Hardcoded Color.white"
    description: "Use AppColors tokens instead of Color.white"
    regex: "Color\\.white(?!\\()"
    message: "Use AppColors.textPrimary or appropriate AppColors token"
    severity: error
    excluded: "Tests"

  # Enforce token-driven design: no direct font system calls
  hardcoded_font_system:
    name: "Hardcoded font(.system(size:))"
    description: "Use typography modifiers instead of .font(.system(size:))"
    regex: "\\.font\\(\\.system\\(size:"
    message: "Use typography modifiers like .bodyMedium(), .captionSmall(), etc"
    severity: warning
    excluded: "Tests"

  # Enforce AppColors: no direct Color.black
  hardcoded_black_color:
    name: "Hardcoded Color.black"
    description: "Use AppColors tokens instead of Color.black"
    regex: "Color\\.black"
    message: "Use appropriate AppColors token"
    severity: error
    excluded: "Tests"

  # Enforce AppSpacing: no magic numbers in padding/spacing
  magic_spacing_numbers:
    name: "Magic spacing numbers"
    description: "Use AppSpacing enum instead of hardcoded values"
    regex: "\\.padding\\([0-9]{2,}\\)"
    message: "Use AppSpacing tokens (xs, sm, md, lg, xl, xxl)"
    severity: warning
    excluded: "Tests"