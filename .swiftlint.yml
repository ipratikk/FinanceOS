disabled_rules:
  - trailing_whitespace

opt_in_rules:
  - empty_count
  - explicit_init
  - force_unwrapping
  - force_cast
  - fatal_error_message
  - first_where
  - sorted_first_last
  - prefer_self_type_over_type_of_self

analyzer_rules:
  - unused_import

included:
  - Apps
  - Packages

excluded:
  - .build
  - DerivedData
  - .derivedData
  - .swiftpm
  - Packages/**/.build
  - Packages/**/Snapshots
  - Packages/**/Generated
  - Packages/**/Preview Content
  - Packages/**/Resources
  - fastlane
  - Scripts
  - vendor
  - graphify

line_length:
  warning: 120
  error: 160

type_body_length:
  warning: 250
  error: 300

file_length:
  warning: 400
  error: 500

function_body_length:
  warning: 50
  error: 75

identifier_name:
  min_length:
    warning: 1

custom_rules:
  # Enforce token-driven design: no hardcoded Color.white in components
  # Allow in Design/App*.swift files (design primitives only)
  hardcoded_swiftui_color:
    name: "Hardcoded Color.white"
    description: "Use AppColors tokens instead of Color.white"
    regex: "\\bColor\\.(white|black|red|blue|green|yellow|orange|purple|pink|brown|gray|mint|teal|cyan|indigo)\\b"
    message: "Use AppColors.textPrimary or appropriate AppColors token"
    severity: error
    excluded: "Tests|Design/App|Packages/FinanceCore/Sources/FinanceCore/Design/App|DesignTokens"

  # Enforce token-driven design: no direct font system calls in components
  # Allow in Design/AppTypography.swift (typography primitives only)
  hardcoded_font_system:
    name: "Hardcoded font(.system(size:))"
    description: "Use typography modifiers instead of .font(.system(size:))"
    regex: "\\.font\\(\\.system\\(size:"
    message: "Use typography modifiers like .bodyMedium(), .captionSmall(), etc"
    severity: warning
    excluded: "Tests|AppTypography"

  # Enforce AppSpacing: no magic numbers in padding/spacing
  magic_spacing_numbers:
    name: "Magic spacing numbers"
    description: "Use AppSpacing enum instead of hardcoded values"
    regex: "\\.padding\\([0-9]{2,}\\)"
    message: "Use AppSpacing tokens (xs, sm, md, lg, xl, xxl)"
    severity: warning
    excluded: "Tests"

  # Text() only allowed in Picker selections, use FDSLabel everywhere else
  direct_text_in_bodies:
    name: "Direct Text() outside Picker"
    description: "Use FDSLabel for text display, Text() only in Picker selections"
    regex: "(VStack|HStack|ZStack|ScrollView|Group).*\\bText\\("
    message: "Use FDSLabel instead of Text() for display text"
    severity: warning
    excluded: "Tests|Previews"
